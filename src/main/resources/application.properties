spring.application.name=Java26Demo

# In-memory SQL database configuration
spring.datasource.url=jdbc:h2:mem:demo-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Daily Spring Batch database cleanup
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always
app.jobs.database-cleanup.cron=0 0 6 * * *
app.jobs.database-cleanup.zone=America/New_York

# H2 console for easy inspection
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
# Disable Springdoc HATEOAS and Data REST integration (incompatible with Spring Boot 4)
springdoc.hateoas.enabled=false
springdoc.data-rest.enabled=false
